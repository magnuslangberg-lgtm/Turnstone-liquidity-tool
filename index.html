<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnstone Liquidity Tool</title>
    <style>
      html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #0c0e12; }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
      (function () {
        const rechartsSources = [
          "https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js",
          "https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"
        ];

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = src;
            script.onload = () => resolve(src);
            script.onerror = () => reject(new Error(`Failed to load ${src}`));
            document.head.appendChild(script);
          });
        }

        async function loadRecharts() {
          for (const src of rechartsSources) {
            try {
              await loadScript(src);
              if (window.Recharts) {
                return;
              }
            } catch (_) {
              // Try next source.
            }
          }
          console.warn("Recharts kunne ikke lastes fra noen CDN-kilder. Appen starter i forenklet modus.");
        }

        async function startApp() {
          await loadRecharts();
          const appScript = document.createElement("script");
          appScript.type = "text/babel";
          appScript.src = "./app.jsx";
          document.body.appendChild(appScript);
        }

        startApp();
      })();
    </script>
  </body>
</html>
